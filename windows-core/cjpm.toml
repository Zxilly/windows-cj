[package]
  name = "windows_core"
  version = "0.1.0"
  description = "Core runtime types for Windows API bindings in Cangjie"
  output-type = "static"
  cjc-version = "1.1.0"
  compile-option = "-lole32 -loleaut32 -lwindowsapp -Woff unused"

[dependencies]
  windows_result = { path = "../windows-result" }
  windows_strings = { path = "../windows-strings" }
  windows_interface = { path = "../windows-interface" }
  windows_implement = { path = "../windows-implement" }
  windows_sys = { path = "../windows-sys" }
